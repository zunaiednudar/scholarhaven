<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - ScholarHaven'">Browse Books</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .book-cover-placeholder {
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="font-sans bg-gray-50">

<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center space-x-3">
                <div class="h-12 w-12 rounded-full bg-gradient-to-r from-red-600 to-red-800 flex items-center justify-center text-white font-bold text-xl ring-2 ring-red-200">
                   <img src="/logo-scholarhaven.jpg" alt="ScholarHaven Logo" class="h-full w-full object-cover rounded-full">     
                </div>
                <a href="/" class="text-2xl font-bold text-red-600">ScholarHaven</a>
            </div>
            <div class="flex-1 max-w-xl mx-8">
                <form action="/books" method="get" class="flex">
                    <input type="hidden" name="categoryId" th:value="${currentCategory}" />
                    <input type="text" name="q" th:value="${searchQuery}" placeholder="Search by title or author..."
                           class="w-full px-4 py-2 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-red-400">
                    <button type="submit" class="bg-red-600 text-white px-6 rounded-r-lg hover:bg-red-700">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
            <div class="flex items-center space-x-6" id="userMenu">
                <a href="/cart" id="cartLink" class="text-gray-700 hover:text-red-600 relative hidden">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
                </a>
                <div id="user-menu-container"></div>
            </div>
        </div>
        <div class="flex space-x-8 py-3 border-t">
            <a href="/" class="text-gray-700 hover:text-red-600">Home</a>
            <a href="/books" class="text-red-600 font-medium">All Books</a>
            <a href="/orders" id="myOrdersLink" class="text-gray-700 hover:text-red-600 hidden">My Orders</a>
            <a href="/my-books-dashboard" id="sellBooksLink" class="text-gray-700 hover:text-red-600 hidden">Sell Books</a>
        </div>
    </div>
</nav>

<div class="container mx-auto px-4 py-8">
    <div class="flex flex-col lg:flex-row gap-8">
        <div class="w-full lg:w-64 flex-shrink-0">
            <div class="bg-white rounded-lg shadow p-4 sticky top-24">
                <h3 class="font-bold text-lg mb-3">Categories</h3>
                <ul class="space-y-2">
                    <li>
                        <a href="/books" class="flex justify-between items-center hover:text-red-600"
                           th:classappend="${currentCategory == null} ? 'text-red-600 font-medium' : 'text-gray-700'">
                            <span>All Books</span>
                            <span class="text-sm bg-gray-100 px-2 py-1 rounded">All</span>
                        </a>
                    </li>
                    <li th:each="cat : ${categories}">
                        <a th:href="@{/books(categoryId=${cat.id})}"
                           class="flex justify-between items-center hover:text-red-600"
                           th:classappend="${currentCategory == cat.id} ? 'text-red-600 font-medium' : 'text-gray-700'">
                            <span th:text="${cat.name}">Fiction</span>
                            <span class="text-sm bg-gray-100 px-2 py-1 rounded" th:text="${bookCounts[cat.id] ?: 0}">25</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="flex-1">
            <h1 class="text-3xl font-bold mb-6" th:text="${title}">All Books</h1>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <div th:each="book : ${books}" class="bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition flex flex-col">
                    <div class="w-full h-48 relative overflow-hidden bg-gray-100">
                        <img th:if="${book.coverImage != null and book.coverImage != ''}" 
                             th:src="${book.coverImage}" 
                             alt="Book cover" 
                             class="w-full h-full object-cover"
                             onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'w-full h-full bg-gray-100 flex items-center justify-center\'><i class=\'fas fa-book text-5xl text-gray-400\'></i></div>'">
                        <div th:unless="${book.coverImage != null and book.coverImage != ''}" 
                             class="w-full h-full bg-gray-100 flex items-center justify-center">
                            <i class="fas fa-book text-5xl text-gray-400"></i>
                        </div>
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <h3 class="font-bold text-lg mb-1 truncate" th:text="${book.title}">Book Title</h3>
                        <p class="text-gray-600 text-sm mb-2 truncate" th:text="${book.author}">Author Name</p>
                        <p class="text-xs text-gray-500 mb-3" th:text="${book.categoryName}">Category</p>
                      
                        <div class="flex justify-between items-center gap-2 mb-4">
                            <span class="text-red-600 font-bold text-xl" th:text="'$' + ${book.finalPrice}">$29.99</span>
                            <a th:href="@{'/books/' + ${book.id}}" 
                               class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm hover:bg-blue-700 transition">
                                View Details
                            </a>
                        </div>
                        
                        <a th:href="@{'/books/' + ${book.id}}" 
                           class="block w-full bg-green-600 text-white py-2.5 rounded text-sm font-medium text-center hover:bg-green-700 transition-colors">
                            <i class="fas fa-shopping-cart mr-2"></i>Order Now
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${books.empty}" class="text-center py-12">
                <i class="fas fa-book-open text-6xl text-gray-300 mb-4"></i>
                <p class="text-gray-500 text-xl">No books found in this category.</p>
                <a href="/books" class="text-red-600 hover:text-red-700 mt-4 inline-block">View all books</a>
            </div>
        </div>
    </div>
</div>

<footer class="bg-gray-900 text-white pt-8 pb-4 mt-12">
    <div class="container mx-auto px-4 text-center">
        <p class="text-gray-500">&copy; 2024 ScholarHaven. All rights reserved.</p>
    </div>
</footer>

<script>
    function updateCartCount() {
        try {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCountEl = document.getElementById('cart-count');
            if (cartCountEl) cartCountEl.textContent = count;
        } catch (e) {}
    }

    (function() {
        const token = localStorage.getItem('jwt');
        const username = localStorage.getItem('username') || 'User';
        const userMenuContainer = document.getElementById('user-menu-container');
        const sellBooksLink = document.getElementById('sellBooksLink');
        const myOrdersLink = document.getElementById('myOrdersLink');
        const cartLink = document.getElementById('cartLink');

        if (token) {
            document.cookie = `jwt=${token}; path=/; max-age=86400; SameSite=Lax`;
            
            if (cartLink) cartLink.classList.remove('hidden');
            if (myOrdersLink) myOrdersLink.classList.remove('hidden');

            fetch('/api/user/roles', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => res.json())
            .then(data => {
                const isSeller = data.roles && data.roles.includes('SELLER');

                let menuHtml = `
                    <div class="relative group">
                        <button class="flex items-center space-x-1 text-gray-700 hover:text-red-600">
                            <i class="fas fa-user-circle text-2xl"></i>
                            <span class="font-medium">${escapeHtml(username)}</span>
                            <i class="fas fa-chevron-down text-xs"></i>
                        </button>
                        <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl hidden group-hover:block z-50">
                            <div class="px-4 py-2 border-b">
                                <p class="text-sm text-gray-500">Signed in as</p>
                                <p class="font-semibold">${escapeHtml(username)}</p>
                            </div>
                            <a href="/profile" class="block px-4 py-2 hover:bg-gray-100">Profile</a>
                            <a href="/orders" class="block px-4 py-2 hover:bg-gray-100">My Orders</a>
                `;

                if (isSeller) {
                    menuHtml += `<a href="/my-books-dashboard" class="block px-4 py-2 hover:bg-gray-100">Sell Books</a>`;
                    if (sellBooksLink) sellBooksLink.classList.remove('hidden');
                } else {
                    menuHtml += `<a href="/seller/become-seller" class="block px-4 py-2 bg-yellow-50 text-yellow-700 hover:bg-yellow-100">Become a Seller</a>`;
                    if (sellBooksLink) sellBooksLink.classList.add('hidden');
                }

                menuHtml += `
                            <hr>
                            <a href="#" onclick="logout()" class="block px-4 py-2 text-red-600 hover:bg-gray-100">Logout</a>
                        </div>
                    </div>
                `;

                userMenuContainer.innerHTML = menuHtml;
                updateCartCount();
            })
            .catch(() => {
                userMenuContainer.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <a href="/login" class="text-gray-700 hover:text-red-600 px-3 py-2">Login</a>
                        <a href="/register" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Register</a>
                    </div>
                `;
            });
        } else {
            if (cartLink) cartLink.classList.add('hidden');
            if (myOrdersLink) myOrdersLink.classList.add('hidden');
            if (sellBooksLink) sellBooksLink.classList.add('hidden');
            
            userMenuContainer.innerHTML = `
                <div class="flex items-center space-x-2">
                    <a href="/login" class="text-gray-700 hover:text-red-600 px-3 py-2">Login</a>
                    <a href="/register" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Register</a>
                </div>
            `;
            updateCartCount();
        }
    })();

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;');
    }

    function logout() {
        localStorage.removeItem('jwt');
        localStorage.removeItem('username');
        document.cookie = 'jwt=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
        window.location.href = '/';
    }
</script>

</body>
</html>
