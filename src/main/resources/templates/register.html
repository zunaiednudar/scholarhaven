<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ScholarHaven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-neutral-800 flex items-center justify-center min-h-screen py-20">
<div class="bg-white p-8 rounded-xl w-full max-w-md">
    <div class="flex flex-col items-center mb-6">
        <div class="h-32 w-32 rounded-full bg-gradient-to-r from-red-600 to-red-800 flex items-center justify-center text-white font-bold text-3xl ring-2 ring-red-200 mb-4">
            <img src="/logo-scholarhaven.jpg" alt="ScholarHaven Logo" class="w-full h-full object-cover rounded-full">
        </div>
        <h2 class="text-4xl font-semibold">Register</h2>
        <h1 class="text-2xl text-red-800">ScholarHaven</h1>
    </div>

    <hr class="mb-8" />

    <div id="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 hidden"></div>
    <div id="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 hidden"></div>

    <form id="registerForm" class="space-y-4">
        <div>
            <label for="name" class="text-gray-700 block mb-2">Full Name *</label>
            <input type="text" id="name" name="name" required 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                   placeholder="Enter your full name">
        </div>

        <div>
            <label for="username" class="text-gray-700 block mb-2">Username *</label>
            <input type="text" id="username" name="username" required 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                   placeholder="Choose a username">
        </div>

        <div>
            <label for="email" class="text-gray-700 block mb-2">Email *</label>
            <input type="email" id="email" name="email" required 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                   placeholder="Enter your email">
        </div>

        <div>
            <label for="password" class="text-gray-700 block mb-2">Password *</label>
            <input type="password" id="password" name="password" required 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                   placeholder="Create a password (min 6 characters)">
        </div>

        <div>
            <label for="confirmPassword" class="text-gray-700 block mb-2">Confirm Password *</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                   placeholder="Confirm your password">
        </div>

        <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
            Register
        </button>

        <p class="text-sm text-gray-500 text-center mt-4">
            Already have an account?
            <a href="/login" class="text-blue-600 hover:text-blue-800">Login</a>
        </p>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Get form values
            const name = document.getElementById('name').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Clear previous messages
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');

            // Validate all fields are filled
            if (!name || !username || !email || !password || !confirmPassword) {
                errorMessage.textContent = 'All fields are required';
                errorMessage.classList.remove('hidden');
                return;
            }

            // Validate passwords match
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match';
                errorMessage.classList.remove('hidden');
                return;
            }

            // Validate password length
            if (password.length < 6) {
                errorMessage.textContent = 'Password must be at least 6 characters';
                errorMessage.classList.remove('hidden');
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorMessage.textContent = 'Please enter a valid email address';
                errorMessage.classList.remove('hidden');
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';

            const requestBody = {
                name: name,
                username: username,
                email: email,
                password: password,
                confirmPassword: confirmPassword
            };

            console.log('Sending registration request:', requestBody);

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                console.log('Response:', response.status, data);

                if (response.ok) {
                    successMessage.textContent = data.message || 'Registration successful! Redirecting to login...';
                    successMessage.classList.remove('hidden');
                    
                    // Clear form
                    form.reset();
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login?registered=true';
                    }, 2000);
                } else {
                    errorMessage.textContent = data.message || data.error || 'Registration failed. Please try again.';
                    errorMessage.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Register';
                }
            } catch (error) {
                console.error('Registration error:', error);
                errorMessage.textContent = 'Network error. Please check your connection and try again.';
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            }
        });
    });
</script>
</body>
</html>
