<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ScholarHaven</title>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        playfair: ['Playfair Display', 'serif'],
                        lato: ['Lato', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="font-lato bg-neutral-800 flex items-center justify-center h-screen"
      style="font-family: 'Lato', sans-serif;">
<div class="bg-white p-8 rounded-xl w-full max-w-md">
    <div class="flex justify-center items-start mb-4">
        <img src="/logo-scholarhaven.jpg" alt="ScholarHaven Logo" class="w-32 h-32" />
    </div>

    <h2 class="font-playfair text-2xl mb-6 text-center"
        style="font-family: 'Playfair Display', serif;">
        Log in to your account
    </h2>

    <form id="loginForm" class="space-y-4">
        <div>
            <label for="username" class="text-gray-700">Username</label>
            <input type="text" id="username" name="username"
                   class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <div class="flex flex-row justify-between items-center">
                <label for="password" class="block text-gray-700">Password</label>
                <a href="/forgot-password" class="text-blue-500 hover:text-blue-600 cursor-pointer">Forgot Password?</a>
            </div>
            <input type="password" id="password" name="password"
                   class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button type="submit"
                class="w-full bg-blue-500 text-white font-semibold p-2 rounded hover:bg-blue-600 focus:ring-2 focus:ring-blue-400">
            Login
        </button>

        <p class="text-sm text-gray-500 text-center mt-4">
            Don't have an account?
            <a href="/register" class="text-blue-500 hover:text-blue-600">Register</a>
        </p>

        <p id="errorMessage" class="text-red-500 text-sm mt-2"></p>
        <p id="successMessage" class="text-green-500 text-sm mt-2"></p>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        errorMessage.textContent = '';
        successMessage.textContent = '';

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });

            if (!response.ok) {
                errorMessage.textContent = 'Invalid username or password';
                return;
            }

            const data = await response.json();
            document.cookie = `jwt=${data.token}; path=/; SameSite=Strict`;
            successMessage.textContent = 'Login successful! Redirecting...';
            setTimeout(() => window.location.href = '/', 1000);

        } catch (error) {
            errorMessage.textContent = 'Something went wrong. Please try again.';
        }
    });
</script>
</body>
</html>
