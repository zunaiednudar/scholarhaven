<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - ScholarHaven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="font-sans bg-gray-50">

<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center space-x-3">
                <div class="h-12 w-12 rounded-full bg-gradient-to-r from-red-600 to-red-800 flex items-center justify-center text-white font-bold text-xl">
                    SH
                </div>
                <a href="/" class="text-2xl font-bold text-red-600">ScholarHaven</a>
            </div>
            <div class="flex items-center space-x-6">
                <a href="/my-books" class="text-gray-700 hover:text-red-600">My Books</a>
                <a href="#" onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mx-auto px-4 py-8 max-w-2xl">
    <div class="bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Add New Book</h1>

        <div id="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 hidden">
            <i class="fas fa-check-circle mr-2"></i>
            <span id="successText">Book added successfully! Redirecting...</span>
        </div>

        <div id="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 hidden">
            <i class="fas fa-exclamation-circle mr-2"></i>
            <span id="errorText">An error occurred</span>
        </div>

        <form id="addBookForm">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Title *</label>
                <input type="text" id="title" required
                       class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Author *</label>
                <input type="text" id="author" required
                       class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Description</label>
                <textarea id="description" rows="4"
                          class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Price ($) *</label>
                    <input type="number" id="price" step="0.01" min="0.01" required
                           class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Stock *</label>
                    <input type="number" id="stock" min="1" required
                           class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Category *</label>
                <select id="categoryId" required
                        class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
                    <option value="">-- Select a Category --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}">Category Name</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Cover Image (upload)</label>
                <input type="file" id="coverImage" name="coverImage" accept="image/*"
                       class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Preview PDF (optional)</label>
                <input type="file" id="previewPdf" name="previewPdf" accept="application/pdf"
                       class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
            </div>

          

           

            <div class="flex space-x-4">
                <button type="submit" id="submitBtn"
                        class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700">
                    Add Book
                </button>
                <a href="/my-books" class="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    (function() {
        const token = localStorage.getItem('jwt');
        if (!token) {
            window.location.href = '/login';
            return;
        }
        document.cookie = `jwt=${token}; path=/; max-age=86400; SameSite=Lax`;
    })();

    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('addBookForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Adding...';
            successMessage.classList.add('hidden');
            errorMessage.classList.add('hidden');

            try {
                const token = localStorage.getItem('jwt');
                if (!token) {
                    window.location.href = '/login';
                    return;
                }

                const formData = new FormData();
                formData.append('title', document.getElementById('title').value.trim());
                formData.append('author', document.getElementById('author').value.trim());
                formData.append('description', document.getElementById('description').value.trim() || '');
                formData.append('price', parseFloat(document.getElementById('price').value));
                formData.append('stock', parseInt(document.getElementById('stock').value));
                formData.append('categoryId', parseInt(document.getElementById('categoryId').value));
                
                formData.append('pricingStrategy', document.getElementById('pricingStrategy').value || 'STANDARD');

                const coverImageFile = document.getElementById('coverImage').files[0];
                const previewPdfFile = document.getElementById('previewPdf').files[0];
                if (coverImageFile) {
                    formData.append('coverImage', coverImageFile);
                }
                if (previewPdfFile) {
                    formData.append('previewPdf', previewPdfFile);
                }

                const response = await fetch('/api/books/with-image', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    },
                    body: formData
                });

                if (response.ok) {
                    successMessage.classList.remove('hidden');
                    document.cookie = `jwt=${token}; path=/; max-age=86400; SameSite=Lax`;

                    setTimeout(() => {
                        window.location.href = '/my-books?success=added';
                    }, 500);
                } else {
                    const error = await response.text();
                    errorText.innerText = 'Failed to add book: ' + error;
                    errorMessage.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Add Book';
                }
            } catch (error) {
                errorText.innerText = 'Error: ' + error.message;
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Add Book';
            }
        });
    });

    function logout() {
        localStorage.removeItem('jwt');
        localStorage.removeItem('username');
        document.cookie = 'jwt=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
        window.location.href = '/';
    }
</script>

</body>
</html>
