<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - ScholarHaven</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-neutral-800 flex items-center justify-center py-8 min-h-screen"
      style="font-family: 'Inter', sans-serif;">
<div class="bg-white p-8 rounded-xl w-full max-w-md shadow-lg">
  <div class="flex justify-center mb-4">
    <img src="/logo-scholarhaven.jpg" alt="ScholarHaven Logo" class="w-32 h-32" />
  </div>

  <h2 class="text-2xl mb-6 text-center"
      style="">
    Forgot Password?
  </h2>

  <form id="forgotPasswordForm" class="space-y-4">
    <div>
      <label for="email" class="text-gray-700">Enter your registered email</label>
      <input type="email" id="email" name="email"
             class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
             placeholder="example@domain.com" required>
      <p class="text-xs text-gray-500 mt-1">We'll send a reset link to your email.</p>
    </div>

    <button type="submit"
            class="w-full bg-blue-500 text-white font-semibold p-2 rounded hover:bg-blue-600 focus:ring-2 focus:ring-blue-400">
      Send Reset Link
    </button>

    <p class="text-sm text-gray-500 text-center mt-4">
      Remembered your password?
      <a href="/login" class="text-blue-500 hover:text-blue-600">Login</a>
    </p>

    <p id="errorMessage" class="text-red-500 text-sm mt-2"></p>
    <p id="successMessage" class="text-green-500 text-sm mt-2"></p>
  </form>
</div>

<script>
  document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    errorMessage.textContent = '';
    successMessage.textContent = '';

    try {
      const response = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value
        })
      });

      successMessage.textContent = 'If this email is registered, a reset link will be sent shortly.';

    } catch (error) {
      errorMessage.textContent = 'Something went wrong. Please try again.';
    }
  });
</script>
</body>
</html>
