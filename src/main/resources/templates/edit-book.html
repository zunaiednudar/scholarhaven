<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book - ScholarHaven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="font-sans bg-gray-50">

<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center space-x-3">
                <div class="h-12 w-12 rounded-full bg-gradient-to-r from-red-600 to-red-800 flex items-center justify-center text-white font-bold text-xl">
                    SH
                </div>
                <a href="/" class="text-2xl font-bold text-red-600">ScholarHaven</a>
            </div>
            <div class="flex items-center space-x-6">
                <a href="/my-books" class="text-gray-700 hover:text-red-600">My Books</a>
                <a href="#" onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mx-auto px-4 py-8 max-w-2xl">
    <div class="bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Edit Book</h1>

        <div id="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 hidden">
            <i class="fas fa-check-circle mr-2"></i> Book updated successfully! Redirecting...
        </div>

        <div id="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 hidden">
            <i class="fas fa-exclamation-circle mr-2"></i> <span id="errorText"></span>
        </div>

        <form id="editBookForm" enctype="multipart/form-data">
            <input type="hidden" id="bookId" th:value="${book.id}">

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Title *</label>
                <input type="text" id="title" th:value="${book.title}" required
                       class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Author *</label>
                <input type="text" id="author" th:value="${book.author}" required
                       class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Description</label>
                <textarea id="description" rows="4"
                          class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400"
                          th:text="${book.description}"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Price ($) *</label>
                    <input type="number" id="price" step="0.01" th:value="${book.originalPrice}" required
                           class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Stock *</label>
                    <input type="number" id="stock" th:value="${book.stock}" required
                           class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Category *</label>
                <select id="categoryId" required
                        class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
                    <option value="">-- Select a Category --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${book.categoryId == cat.id}">Category Name</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Current Cover Image</label>
                <div class="mb-2" th:if="${book.coverImage}">
                    <img th:src="${book.coverImage}"
                         alt="Current cover" class="w-32 h-32 object-cover rounded border">
                </div>
                <input type="file" id="coverImage" name="coverImage" accept="image/*"
                       class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
                <p class="text-sm text-gray-500 mt-1">Leave empty to keep current image</p>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Current Preview PDF</label>
                <div th:if="${book.previewPdf}" class="mb-2">
                    <a th:href="${book.previewPdf}" target="_blank" class="text-indigo-600 hover:underline">
                        <i class="fas fa-file-pdf mr-1"></i>View existing preview PDF
                    </a>
                </div>
                <div th:if="${book.previewPdf == null}">No preview PDF uploaded yet.</div>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Replace Preview PDF (optional)</label>
                <input type="file" id="previewPdf" name="previewPdf" accept="application/pdf"
                       class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
                <p class="text-sm text-gray-500 mt-1">Leave empty to keep current preview</p>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Status</label>
                <select id="status"
                        class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-400">
                    <option value="AVAILABLE" th:selected="${book.status == 'AVAILABLE'}">Available</option>
                    <option value="SOLD" th:selected="${book.status == 'SOLD'}">Sold</option>
                </select>
            </div>

        

            <div class="flex space-x-4">
                <button type="submit" id="submitBtn"
                        class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700">
                    Update Book
                </button>
                <a th:href="@{'/books/' + ${book.id}}" class="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('editBookForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';
            successMessage.classList.add('hidden');
            errorMessage.classList.add('hidden');

            try {
                const bookId = document.getElementById('bookId').value;

                const bookData = {
                    title: document.getElementById('title').value,
                    author: document.getElementById('author').value,
                    description: document.getElementById('description').value || '',
                    price: parseFloat(document.getElementById('price').value),
                    stock: parseInt(document.getElementById('stock').value),
                    categoryId: parseInt(document.getElementById('categoryId').value),
                    status: document.getElementById('status').value,
                    featured: document.getElementById('featured').checked
                };

                const formData = new FormData();
                formData.append('title', bookData.title);
                formData.append('author', bookData.author);
                formData.append('description', bookData.description);
                formData.append('price', bookData.price);
                formData.append('stock', bookData.stock);
                formData.append('categoryId', bookData.categoryId);
                formData.append('featured', bookData.featured);
                formData.append('pricingStrategy', document.getElementById('pricingStrategy') ? document.getElementById('pricingStrategy').value : 'STANDARD');

                const coverImage = document.getElementById('coverImage').files[0];
                const token = localStorage.getItem('jwt');
                if (!token) {
                    window.location.href = '/login';
                    return;
                }

                let response;

                const previewPdf = document.getElementById('previewPdf').files[0];
                if (coverImage || previewPdf) {
                    if (coverImage) formData.append('coverImage', coverImage);
                    if (previewPdf) formData.append('previewPdf', previewPdf);
                    response = await fetch('/api/books/' + bookId + '/with-image', {
                        method: 'PUT',
                        headers: {
                            'Authorization': 'Bearer ' + token
                        },
                        body: formData
                    });
                } else {
                    response = await fetch('/api/books/' + bookId, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify(bookData)
                    });
                }

                if (response.ok) {
                    successMessage.classList.remove('hidden');
                    document.cookie = `jwt=${token}; path=/; max-age=86400; SameSite=Lax`;

                    setTimeout(() => {
                        window.location.href = '/my-books?updated=true';
                    }, 1500);
                } else {
                    const error = await response.text();
                    errorText.textContent = 'Failed to update book: ' + error;
                    errorMessage.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Update Book';
                }
            } catch (error) {
                errorText.textContent = 'Error: ' + error.message;
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Book';
            }
        });
    });

    function logout() {
        localStorage.removeItem('jwt');
        localStorage.removeItem('username');
        document.cookie = 'jwt=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
        window.location.href = '/';
    }
</script>

</body>
</html>
