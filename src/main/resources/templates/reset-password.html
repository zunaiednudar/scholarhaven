<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ScholarHaven</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-neutral-800 flex items-center justify-center min-h-screen"
      style="font-family: 'Inter', sans-serif;">
<div class="bg-white p-8 rounded-xl w-full max-w-md shadow-lg">
    <div class="flex justify-center mb-4">
        <img src="/logo-scholarhaven.jpg" alt="ScholarHaven Logo" class="w-32 h-32" />
    </div>

    <h2 class="text-2xl mb-6 text-center"
        style="">
        Reset Password
    </h2>

    <form id="resetPasswordForm" class="space-y-4">
        <div>
            <label for="newPassword" class="text-gray-700">New Password</label>
            <input type="password" id="newPassword" name="newPassword" required
                   class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Enter new password">
        </div>

        <div>
            <label for="confirmPassword" class="text-gray-700">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required
                   class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Confirm new password">
        </div>

        <button type="submit"
                class="w-full bg-blue-500 text-white font-semibold p-2 rounded hover:bg-blue-600 focus:ring-2 focus:ring-blue-400">
            Reset Password
        </button>

        <p id="errorMessage" class="text-red-500 text-sm mt-2"></p>
        <p id="successMessage" class="text-green-500 text-sm mt-2"></p>
    </form>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        document.getElementById('errorMessage').textContent = 'Invalid or missing reset token.';
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        errorMessage.textContent = '';
        successMessage.textContent = '';

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
            errorMessage.textContent = 'Passwords do not match';
            return;
        }

        try {
            const response = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });

            if (!response.ok) {
                const error = await response.text();
                errorMessage.textContent = error || 'Reset failed. Link may have expired.';
                return;
            }

            successMessage.textContent = 'Password reset successful! Redirecting to login...';
            setTimeout(() => window.location.href = '/login', 2000);

        } catch (error) {
            errorMessage.textContent = 'Something went wrong. Please try again.';
        }
    });
</script>
</body>
</html>
