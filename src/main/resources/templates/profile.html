<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ScholarHaven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="font-sans bg-gray-50">

<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center space-x-3">
               <div class="h-12 w-12 rounded-full bg-gradient-to-r from-red-600 to-red-800 flex items-center justify-center text-white font-bold text-xl ring-2 ring-red-200">
                   <img src="/logo-scholarhaven.jpg" alt="ScholarHaven Logo" class="h-full w-full object-cover rounded-full">     
                </div>
                <a href="/" class="text-2xl font-bold text-red-600">ScholarHaven</a>
            </div>
            <div class="flex-1 max-w-xl mx-8">
                <form action="/books" method="get" class="flex">
                    <input type="hidden" name="categoryId" th:value="${currentCategory}" />
                    <input type="text" name="q" th:value="${searchQuery}" placeholder="Search by title or author..."
                           class="w-full px-4 py-2 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-red-400">
                    <button type="submit" class="bg-red-600 text-white px-6 rounded-r-lg hover:bg-red-700">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
            <div class="flex items-center space-x-6" id="userMenu">
                <a href="/cart" class="text-gray-700 hover:text-red-600 relative">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span class="absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
                </a>
                <div id="user-menu-container"></div>
            </div>
        </div>
        <div class="flex space-x-8 py-3 border-t">
            <a href="/" class="text-gray-700 hover:text-red-600">Home</a>
            <a href="/books" class="text-gray-700 hover:text-red-600">All Books</a>
            <a href="/books?categoryId=" class="text-gray-700 hover:text-red-600">Categories</a>
        </div>
    </div>
</nav>

<div class="container mx-auto px-4 py-10">
    
        <div class="bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-2xl font-bold mb-4">My Profile</h2>
            <div class="space-y-3">
                <div>
                    <p class="text-gray-500 text-sm">Username</p>
                    <p class="font-semibold" th:text="${user.username}">username</p>
                </div>
                <div>
                    <p class="text-gray-500 text-sm">Email</p>
                    <p class="font-semibold" th:text="${user.email}">email@example.com</p>
                </div>
                <div>
                    <p class="text-gray-500 text-sm">Account Status</p>
                    <p class="font-semibold" th:text="${user.enabled} ? 'Active' : 'Disabled'">Active</p>
                </div>
                <div>
                    <p class="text-gray-500 text-sm">Roles</p>
                    <p class="font-semibold" th:text="${rolesList}">BUYER</p>
                </div>
                <div>
                    <p class="text-gray-500 text-sm">Books listed</p>
                    <p class="font-semibold" th:text="${bookCount}">0</p>
                </div>
            </div>
            <div class="mt-6">
                <form action="/profile/delete" method="post" onsubmit="return confirm('Delete your account? This cannot be undone.');">
                    <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                        Delete My Account
                    </button>
                </form>
            </div>
        </div>

</div>

<footer class="bg-gray-900 text-white pt-8 pb-4 mt-12">
    <div class="container mx-auto px-4 text-center">
        <p class="text-gray-500">&copy; 2026 ScholarHaven. All rights reserved.</p>
    </div>
</footer>

<script>
    (function() {
        const token = localStorage.getItem('jwt');
        const username = localStorage.getItem('username') || 'User';
        const userMenuContainer = document.getElementById('user-menu-container');

        if (token) {
            document.cookie = `jwt=${token}; path=/; max-age=86400; SameSite=Lax`;

            fetch('/api/user/roles', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => res.json())
            .then(data => {
                const isSeller = data.roles.includes('SELLER');

                let menuHtml = `
                    <div class="relative group">
                        <button class="flex items-center space-x-1 text-gray-700 hover:text-red-600">
                            <i class="fas fa-user-circle text-2xl"></i>
                            <span class="font-medium">${username}</span>
                            <i class="fas fa-chevron-down text-xs"></i>
                        </button>
                        <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl hidden group-hover:block">
                            <div class="px-4 py-2 border-b">
                                <p class="text-sm text-gray-500">Signed in as</p>
                                <p class="font-semibold">${username}</p>
                            </div>
                            <a href="/profile" class="block px-4 py-2 hover:bg-gray-100">Profile</a>
                            
                            <a href="/my-books-dashboard" class="block px-4 py-2 hover:bg-gray-100">Sell Books</a>
                             <a href="/my-orders" class="block px-4 py-2 hover:bg-gray-100">My Orders</a>
                `;

                menuHtml += `
                            <hr>
                            <a href="#" onclick="logout()" class="block px-4 py-2 text-red-600 hover:bg-gray-100">Logout</a>
                        </div>
                    </div>
                `;

                userMenuContainer.innerHTML = menuHtml;
            })
            .catch(() => {
                userMenuContainer.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <a href="/login" class="text-gray-700 hover:text-red-600 px-3 py-2">Login</a>
                        <a href="/register" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Register</a>
                    </div>
                `;
            });
        } else {
            userMenuContainer.innerHTML = `
                <div class="flex items-center space-x-2">
                    <a href="/login" class="text-gray-700 hover:text-red-600 px-3 py-2">Login</a>
                    <a href="/register" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Register</a>
                </div>
            `;
        }
    })();

    function logout() {
        localStorage.removeItem('jwt');
        localStorage.removeItem('username');
        document.cookie = 'jwt=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
        window.location.href = '/';
    }
</script>

</body>
</html>
