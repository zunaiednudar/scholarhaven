<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Order #' + ${order.id} + ' - ScholarHaven'">Order Detail - ScholarHaven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .status-pending { background-color: #fef3c7; color: #92400e; }
        .status-confirmed { background-color: #dbeafe; color: #1e40af; }
        .status-shipped { background-color: #e9d5ff; color: #6b21a5; }
        .status-delivered { background-color: #d1fae5; color: #065f46; }
        .status-cancelled { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="bg-gray-50">

<!-- Navigation -->
<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center space-x-3">
                <div class="h-12 w-12 rounded-full bg-gradient-to-r from-red-600 to-red-800 flex items-center justify-center text-white font-bold text-xl ring-2 ring-red-200">
                    <img src="/logo-scholarhaven.jpg" alt="ScholarHaven Logo" class="h-full w-full object-cover rounded-full">
                </div>
                <a href="/" class="text-2xl font-bold text-red-600">ScholarHaven</a>
            </div>
            <div class="flex-1 max-w-xl mx-8">
                <form action="/books" method="get" class="flex">
                    <input type="text" name="q" placeholder="Search by title or author..."
                           class="w-full px-4 py-2 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-red-400">
                    <button type="submit" class="bg-red-600 text-white px-6 rounded-r-lg hover:bg-red-700">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
            <div class="flex items-center space-x-6">
                <a href="/cart" class="text-gray-700 hover:text-red-600 relative">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
                </a>
                <div id="user-menu-container"></div>
            </div>
        </div>
        <div class="flex space-x-8 py-3 border-t overflow-x-auto">
            <a href="/" class="text-gray-700 hover:text-red-600">Home</a>
            <a href="/books" class="text-gray-700 hover:text-red-600">All Books</a>
            <a href="/orders" class="text-gray-700 hover:text-red-600">My Orders</a>
            <a href="/my-books-dashboard" id="sellBooksLink" class="text-gray-700 hover:text-red-600" style="display: none;">Sell Books</a>
        </div>
    </div>
</nav>

<div class="container mx-auto px-4 py-10 max-w-4xl">
    <!-- Back link -->
    <a href="/orders" class="text-blue-600 hover:text-blue-800 mb-6 inline-flex items-center">
        <i class="fas fa-arrow-left mr-2"></i> Back to My Orders
    </a>

    <!-- Order header -->
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
        <div class="flex flex-wrap justify-between items-start">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 mb-1">
                    Order #<span th:text="${order.id}" class="font-mono"></span>
                </h1>
                <p class="text-sm text-gray-500" th:text="'Placed on ' + ${#temporals.format(order.createdAt, 'dd MMM yyyy, hh:mm a')}"></p>
            </div>
            <span th:text="${order.status}"
                  th:classappend="${order.status == 'PENDING'} ? 'status-pending' :
                                 (${order.status == 'CONFIRMED'} ? 'status-confirmed' :
                                 (${order.status == 'SHIPPED'} ? 'status-shipped' :
                                 (${order.status == 'DELIVERED'} ? 'status-delivered' :
                                 (${order.status == 'CANCELLED'} ? 'status-cancelled' :
                                 'bg-gray-100 text-gray-800'))))"
                  class="text-sm font-semibold px-4 py-2 rounded-full">
            </span>
        </div>
        <div class="mt-4 pt-4 border-t">
            <p class="text-sm text-gray-600">
                <i class="fas fa-user mr-2 text-gray-400"></i>
                Buyer: <span class="font-medium text-gray-800" th:text="${order.buyerName}"></span>
                <span class="text-gray-500" th:text="'(@' + ${order.buyerUsername} + ')'"></span>
            </p>
        </div>
    </div>

    <!-- Order items with cover images -->
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b">
            <i class="fas fa-list mr-2 text-red-600"></i>Order Items
        </h2>
        <div class="space-y-4">
            <div th:each="item : ${order.items}" class="flex items-center gap-4 pb-4 border-b last:border-0">
                <!-- Book Cover Image with Fallback -->
                <div class="w-16 h-20 bg-gray-100 rounded-lg flex items-center justify-center flex-shrink-0 overflow-hidden">
                    <img th:if="${item.bookCoverImage != null and item.bookCoverImage != ''}" 
                         th:src="${item.bookCoverImage}" 
                         alt="Book cover"
                         class="w-full h-full object-cover"
                         onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='<div class=\'w-full h-full flex items-center justify-center bg-gray-100\'><i class=\'fas fa-book text-2xl text-gray-400\'></i></div>'">
                    <div th:unless="${item.bookCoverImage != null and item.bookCoverImage != ''}" 
                         class="w-full h-full flex items-center justify-center bg-gray-100">
                        <i class="fas fa-book text-2xl text-gray-400"></i>
                    </div>
                </div>
                <div class="flex-1">
                    <p class="font-semibold text-gray-800" th:text="${item.bookTitle}"></p>
                    <p class="text-sm text-gray-500" th:text="${item.bookAuthor}"></p>
                    <p class="text-sm text-gray-400 mt-1" th:text="'$' + ${item.priceAtPurchase} + ' × ' + ${item.quantity}"></p>
                </div>
                <div class="text-right">
                    <p class="font-bold text-gray-800" th:text="'$' + ${item.subtotal}"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Order summary -->
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b">
            <i class="fas fa-calculator mr-2 text-red-600"></i>Order Summary
        </h2>
        <div class="space-y-3">
            <div class="flex justify-between">
                <span class="text-gray-600">Subtotal</span>
                <span class="font-medium" th:text="'$' + ${order.totalPrice}"></span>
            </div>
            <div class="flex justify-between">
                <span class="text-gray-600">Shipping</span>
                <span class="font-medium text-green-600">Free</span>
            </div>
            <div class="border-t pt-3 flex justify-between">
                <span class="font-bold text-gray-800">Total</span>
                <span class="font-bold text-xl text-red-600" th:text="'$' + ${order.totalPrice}"></span>
            </div>
        </div>
    </div>

    <!-- Cancel button for PENDING orders -->
    <div th:if="${order.status == 'PENDING'}" class="text-right">
        <button th:data-order-id="${order.id}" onclick="cancelOrder(this.dataset.orderId)"
                class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600 transition">
            <i class="fas fa-times-circle mr-2"></i>Cancel Order
        </button>
    </div>
</div>

<footer class="bg-gray-900 text-white pt-8 pb-4 mt-12">
    <div class="container mx-auto px-4 text-center">
        <p class="text-gray-500">&copy; 2024 ScholarHaven. All rights reserved.</p>
    </div>
</footer>

<script>
    async function cancelOrder(orderId) {
        if (!confirm('Are you sure you want to cancel this order?')) return;

        const token = localStorage.getItem('jwt');
        try {
            const response = await fetch(`/api/orders/${orderId}/cancel`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                }
            });

            if (response.ok) {
                window.location.href = '/orders';
            } else {
                alert('Failed to cancel order. Please try again.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Something went wrong. Please try again.');
        }
    }

    function updateCartCount() {
        try {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCountEl = document.getElementById('cart-count');
            if (cartCountEl) cartCountEl.textContent = count;
        } catch (e) {}
    }

    // Navigation menu
    (function() {
        const token = localStorage.getItem('jwt');
        const username = localStorage.getItem('username') || 'User';
        const container = document.getElementById('user-menu-container');
        const sellBooksLink = document.getElementById('sellBooksLink');
        
        if (!container) return;
        
        if (token) {
            document.cookie = `jwt=${token}; path=/; max-age=86400; SameSite=Lax`;
            
            fetch('/api/user/roles', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => r.json())
                .then(data => {
                    const isSeller = data.roles && data.roles.includes('SELLER');
                    container.innerHTML = `
                        <div class="relative group">
                            <button class="flex items-center space-x-1 text-gray-700 hover:text-red-600">
                                <i class="fas fa-user-circle text-2xl"></i>
                                <span class="font-medium">${escapeHtml(username)}</span>
                                <i class="fas fa-chevron-down text-xs"></i>
                            </button>
                            <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl hidden group-hover:block z-50">
                                <div class="px-4 py-2 border-b">
                                    <p class="text-sm text-gray-500">Signed in as</p>
                                    <p class="font-semibold">${escapeHtml(username)}</p>
                                </div>
                                <a href="/profile" class="block px-4 py-2 hover:bg-gray-100">Profile</a>
                                <a href="/orders" class="block px-4 py-2 hover:bg-gray-100">My Orders</a>
                                ${isSeller ? '<a href="/my-books-dashboard" class="block px-4 py-2 hover:bg-gray-100">Sell Books</a>' : '<a href="/seller/become-seller" class="block px-4 py-2 bg-yellow-50 text-yellow-700 hover:bg-yellow-100">Become a Seller</a>'}
                                <hr>
                                <a href="#" onclick="logout()" class="block px-4 py-2 text-red-600 hover:bg-gray-100">Logout</a>
                            </div>
                        </div>
                    `;
                    if (sellBooksLink && isSeller) sellBooksLink.style.display = 'inline-block';
                })
                .catch(err => console.error('Error fetching roles:', err));
        } else {
            container.innerHTML = `<a href="/login" class="text-gray-700 hover:text-red-600 px-3 py-2">Login</a><a href="/register" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Register</a>`;
        }
        updateCartCount();
    })();

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;');
    }

    function logout() {
        localStorage.removeItem('jwt');
        localStorage.removeItem('username');
        document.cookie = 'jwt=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
        window.location.href = '/';
    }
</script>
</body>
</html>
